markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: false

exclude:
  - archive/
  - development/session-logs/
  - development/prompts/
  - "*.log"
  - "**/*log*.md"
  - "**/*session*.md"
  - "**/*handoff*.md"
  - "**/*prompt*.md"
