<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% include favicon.html %}

  <title>{{ page.title | default: site.title | default: site.github.repository_name }}</title>
  <meta name="description" content="{{ page.description | default: site.description | default: site.github.project_tagline }}"/>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #24292f;
      background-color: #ffffff;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Logo constraint - 1/4 viewport width max */
    img[alt*="Logo"], img[alt*="logo"] {
      max-width: 25vw;
      height: auto;
      display: block;
      margin: 0 0 20px 0;
    }

    h1, h2, h3, h4, h5, h6 {
      margin-top: 24px;
      margin-bottom: 16px;
      font-weight: 600;
      line-height: 1.25;
    }

    h1 { font-size: 2em; }
    h2 { font-size: 1.5em; }
    h3 { font-size: 1.25em; }

    p {
      margin-bottom: 16px;
    }

    code {
      padding: 2px 4px;
      font-size: 85%;
      background-color: rgba(175,184,193,0.2);
      border-radius: 3px;
    }

    pre {
      padding: 16px;
      overflow: auto;
      font-size: 85%;
      line-height: 1.45;
      background-color: #f6f8fa;
      border-radius: 6px;
    }

    blockquote {
      padding: 0 1em;
      color: #656d76;
      border-left: 0.25em solid #d0d7de;
    }

    a {
      color: #0969da;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    ul, ol {
      padding-left: 2em;
    }

    li {
      margin-bottom: 4px;
    }

    table {
      border-spacing: 0;
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 16px;
    }

    table th, table td {
      padding: 6px 13px;
      border: 1px solid #d0d7de;
    }

    table th {
      font-weight: 600;
      background-color: #f6f8fa;
    }

    hr {
      height: 1px;
      padding: 0;
      margin: 24px 0;
      background-color: #d0d7de;
      border: 0;
    }

    @media (max-width: 768px) {
      .container {
        padding: 0 15px;
      }

      body {
        padding: 15px;
      }

      /* On mobile, allow logo to be a bit larger */
      img[alt*="Logo"], img[alt*="logo"] {
        max-width: 40vw;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    {{ content }}
  </div>
</body>
</html>
