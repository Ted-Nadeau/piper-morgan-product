# Piper Morgan - Staging Environment Docker Compose
# =================================================
# Production-grade staging deployment with PM-038 MCP integration

version: '3.8'

services:
  # PostgreSQL Database (Staging)
  postgres-staging:
    image: postgres:15
    container_name: piper-postgres-staging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5434:5432"
    volumes:
      - piper_postgres_staging_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    networks:
      - piper-staging-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Redis Cache (Staging)
  redis-staging:
    image: redis:7-alpine
    container_name: piper-redis-staging
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6380:6379"
    volumes:
      - piper_redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    networks:
      - piper-staging-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ChromaDB Vector Database (Staging)
  chromadb-staging:
    image: chromadb/chroma:latest
    container_name: piper-chromadb-staging
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_PORT: 8000
      CHROMA_SERVER_AUTH_CREDENTIALS_FILE: /chroma/auth/credentials
      CHROMA_SERVER_AUTH_PROVIDER: basic
    ports:
      - "8001:8000"
    volumes:
      - piper_chroma_staging_data:/chroma/data
      - ./config/staging/chroma_auth:/chroma/auth:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    networks:
      - piper-staging-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Temporal Workflow Engine (Staging)
  temporal-staging:
    image: temporalio/auto-setup:latest
    container_name: piper-temporal-staging
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres-staging
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7234:7233"
      - "8234:8233"  # Web UI
    depends_on:
      postgres-staging:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal-staging:7233", "workflow", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    networks:
      - piper-staging-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # API Server (Staging)
  api-staging:
    build:
      context: .
      dockerfile: Dockerfile.staging
    container_name: piper-api-staging
    environment:
      - APP_ENV=staging
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-staging:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis-staging:6379
      - CHROMA_HOST=chromadb-staging
      - CHROMA_PORT=8000
      - TEMPORAL_HOST=temporal-staging
      - TEMPORAL_PORT=7233
      # MCP Configuration (Production-ready with pooling)
      - ENABLE_MCP_FILE_SEARCH=true
      - USE_MCP_POOL=true
      - MCP_POOL_MAX_CONNECTIONS=10
      - MCP_CIRCUIT_BREAKER_ENABLED=true
      - MCP_CONTENT_SCORING_ENABLED=true
      # API Keys (Load from environment)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      # Security
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    ports:
      - "8001:8001"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./scripts:/app/scripts:ro
    depends_on:
      postgres-staging:
        condition: service_healthy
      redis-staging:
        condition: service_healthy
      chromadb-staging:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'
    networks:
      - piper-staging-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Web UI (Staging)
  web-staging:
    build:
      context: ./web
      dockerfile: Dockerfile.staging
    container_name: piper-web-staging
    environment:
      - API_BASE_URL=http://api-staging:8001
      - NODE_ENV=staging
    ports:
      - "8081:8080"
    depends_on:
      api-staging:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    networks:
      - piper-staging-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Nginx Reverse Proxy (Staging)
  nginx-staging:
    image: nginx:alpine
    container_name: piper-nginx-staging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/staging/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/staging/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api-staging
      - web-staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    networks:
      - piper-staging-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Prometheus Monitoring (Staging)
  prometheus-staging:
    image: prom/prometheus:latest
    container_name: piper-prometheus-staging
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./config/staging/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - piper_prometheus_staging_data:/prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - piper-staging-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Grafana Dashboard (Staging)
  grafana-staging:
    image: grafana/grafana:latest
    container_name: piper-grafana-staging
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=staging_grafana_admin_2025
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
    ports:
      - "3001:3000"
    volumes:
      - piper_grafana_staging_data:/var/lib/grafana
      - ./config/staging/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/staging/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus-staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - piper-staging-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  piper_postgres_staging_data:
    driver: local
  piper_redis_staging_data:
    driver: local
  piper_chroma_staging_data:
    driver: local
  piper_prometheus_staging_data:
    driver: local
  piper_grafana_staging_data:
    driver: local

networks:
  piper-staging-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
