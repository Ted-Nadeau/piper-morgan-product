name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Verify Python version
        run: |
          python --version
          python -c "import sys; assert sys.version_info >= (3, 11), f'Python {sys.version} < 3.11'"
          echo "✅ Python 3.11+ confirmed for linting"

      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.11-lint-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.11-lint-
            ${{ runner.os }}-pip-3.11-
            ${{ runner.os }}-pip-

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort

      - name: Check code formatting with Black
        run: |
          black --check --diff .

      - name: Check import sorting with isort
        run: |
          isort --check-only --diff services/ tests/ scripts/ main.py web/app.py

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

      - name: Quality summary
        run: |
          echo "## Code Quality Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Black formatting check passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Import sorting check passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Flake8 linting passed" >> $GITHUB_STEP_SUMMARY
          echo "Environment: Python 3.11" >> $GITHUB_STEP_SUMMARY
