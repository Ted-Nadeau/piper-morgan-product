name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      scan-type:
        description: 'Type of security scan to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - dependencies
          - code
          - containers

jobs:
  # Job 1: NPM Security Audit
  npm-audit:
    name: NPM Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: npm-audit
        run: |
          npm audit --audit-level=moderate > npm-audit-report.txt 2>&1 || true
          echo "## NPM Audit Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat npm-audit-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check for critical vulnerabilities
        run: |
          if npm audit --audit-level=critical; then
            echo "✅ No critical vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Critical vulnerabilities detected!" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: npm-audit-report
          path: npm-audit-report.txt

  # Job 2: Python Security Audit (Safety)
  python-safety:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install safety
        run: pip install safety

      - name: Run safety check
        id: safety-check
        run: |
          echo "## Python Safety Check Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          safety check --json > safety-report.json 2>&1 || true
          cat safety-report.json | python -m json.tool >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check for vulnerabilities
        run: |
          if safety check; then
            echo "✅ No known security vulnerabilities in Python dependencies" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Vulnerabilities found in Python dependencies" >> $GITHUB_STEP_SUMMARY
            # Don't fail the build for now, just warn
            # exit 1
          fi

      - name: Upload safety report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: python-safety-report
          path: safety-report.json

  # Job 3: SAST - CodeQL Analysis
  codeql-analysis:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'python' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "/language:${{matrix.language}}"

  # Job 4: Trivy Container & Filesystem Scanning
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy in table format for summary
        run: |
          docker run --rm -v "$PWD":/src aquasec/trivy fs /src \
            --severity HIGH,CRITICAL \
            --format table >> $GITHUB_STEP_SUMMARY

  # Job 5: Secret Scanning with TruffleHog
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for better secret detection

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # Job 6: License Compliance Check
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install license-checker
        run: npm install -g license-checker

      - name: Run license check
        run: |
          echo "## License Compliance Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          license-checker --summary >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # Job 7: OWASP Dependency Check
  owasp-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Piper-Morgan'
          path: '.'
          format: 'HTML,JSON'
          args: >
            --enableRetired
            --enableExperimental

      - name: Upload OWASP results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: owasp-dependency-check-report
          path: reports/

  # Job 8: Security Report Summary
  security-summary:
    name: Security Report Summary
    runs-on: ubuntu-latest
    needs: [npm-audit, python-safety, codeql-analysis, trivy-scan, secret-scan, license-check, owasp-check]
    if: always()
    steps:
      - name: Generate Security Summary
        run: |
          echo "# 🛡️ Security Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Scan Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check job statuses
          if [ "${{ needs.npm-audit.result }}" == "success" ]; then
            echo "✅ NPM Audit: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ NPM Audit: Issues found" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.python-safety.result }}" == "success" ]; then
            echo "✅ Python Safety: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Python Safety: Warnings" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.codeql-analysis.result }}" == "success" ]; then
            echo "✅ CodeQL Analysis: Complete" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ CodeQL Analysis: Issues" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.trivy-scan.result }}" == "success" ]; then
            echo "✅ Trivy Scan: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Trivy Scan: Vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.secret-scan.result }}" == "success" ]; then
            echo "✅ Secret Detection: Clean" >> $GITHUB_STEP_SUMMARY
          else
            echo "🔴 Secret Detection: Secrets found!" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Full reports available in the workflow artifacts" >> $GITHUB_STEP_SUMMARY
          echo "🔍 Check the Security tab for detailed vulnerability information" >> $GITHUB_STEP_SUMMARY
