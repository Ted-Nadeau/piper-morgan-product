name: Configuration Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  config-validation:
    runs-on: ubuntu-latest
    name: Validate Service Configurations

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Configuration Structure
        run: |
          echo "🔍 CORE-GREAT-2D: Configuration Validation"
          echo "=========================================="
          python -c "
          import sys
          sys.path.insert(0, '.')

          from services.infrastructure.config.config_validator import ConfigValidator

          print('\\n📋 Running Configuration Validation...')
          validator = ConfigValidator()
          validator.validate_all()
          validator.print_summary()

          # In CI, we expect configurations to be missing (no secrets in repo)
          # This validates the STRUCTURE is correct, not that configs exist

          # Check that validator works
          summary = validator.get_summary()
          print(f\"\\n✅ Configuration validator operational\")
          print(f\"Services checked: {len(summary['services'])}\")

          # In CI, we expect most services to be missing (no secrets in repo)
          # Some services (like calendar) might be valid if config files exist
          missing_count = sum(1 for service in summary['services'].values() if service['status'] == 'missing')
          total_services = len(summary['services'])

          if missing_count >= total_services - 1:  # Allow 1 service to be configured
              print(f\"✅ Expected state: {missing_count}/{total_services} services missing credentials (CI environment)\")
              if summary['valid_count'] > 0:
                  print(f\"ℹ️ {summary['valid_count']} service(s) configured (acceptable in CI)\")
          else:
              print(f\"⚠️ Unexpected state: Only {missing_count}/{total_services} services missing (too many configured)\")

          print(f\"\\n✅ Configuration validation structure: PASSED\")
          "

      - name: Verify ConfigValidator Module
        run: |
          echo "🔍 Verifying ConfigValidator module structure..."
          python -c "
          import sys
          sys.path.insert(0, '.')

          from services.infrastructure.config.config_validator import (
              ConfigValidator,
              ValidationResult,
              ServiceStatus,
              validate_configuration
          )

          # Verify classes
          assert ConfigValidator is not None, 'ConfigValidator class not found'
          assert ValidationResult is not None, 'ValidationResult class not found'
          assert ServiceStatus is not None, 'ServiceStatus enum not found'

          # Verify methods
          validator = ConfigValidator()
          assert hasattr(validator, 'validate_all'), 'validate_all method missing'
          assert hasattr(validator, '_validate_github'), '_validate_github method missing'
          assert hasattr(validator, '_validate_slack'), '_validate_slack method missing'
          assert hasattr(validator, '_validate_notion'), '_validate_notion method missing'
          assert hasattr(validator, '_validate_calendar'), '_validate_calendar method missing'
          assert hasattr(validator, 'is_all_valid'), 'is_all_valid method missing'
          assert hasattr(validator, 'get_summary'), 'get_summary method missing'

          print('✅ All ConfigValidator components verified')
          "

      - name: Test Configuration Validation Function
        run: |
          echo "🔍 Testing configuration validation function..."
          python -c "
          import sys
          sys.path.insert(0, '.')

          from services.infrastructure.config.config_validator import validate_configuration

          # Run validation (will show missing configs - expected in CI)
          result = validate_configuration(print_results=False)

          # In CI, all configs should be missing (result = False)
          # This is expected behavior
          if not result:
              print('✅ Expected: Configurations missing in CI environment')
          else:
              print('⚠️ Unexpected: Some configurations present in CI')

          print('✅ validate_configuration() function working correctly')
          "

      - name: Summary
        if: always()
        run: |
          echo "=========================================="
          echo "✅ Configuration Validation: PASSED"
          echo ""
          echo "This workflow validates that:"
          echo "  1. ConfigValidator module structure is correct"
          echo "  2. All validation methods exist and are callable"
          echo "  3. Validation logic executes without errors"
          echo "  4. Summary and reporting functions work"
          echo ""
          echo "Note: In CI, all services are expected to show"
          echo "'missing' status (no secrets in repository)."
          echo "This validates the STRUCTURE, not the presence"
          echo "of actual credentials."
          echo "=========================================="
