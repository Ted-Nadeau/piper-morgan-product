name: Dependency Health Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9 AM UTC
  workflow_dispatch:  # Allow manual triggering

jobs:
  check-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check for outdated packages
        id: outdated
        run: |
          echo "## Outdated Dependencies" >> $GITHUB_STEP_SUMMARY
          pip list --outdated > outdated.txt
          cat outdated.txt >> $GITHUB_STEP_SUMMARY

          # Count outdated packages
          OUTDATED_COUNT=$(tail -n +3 outdated.txt | wc -l)
          echo "outdated_count=$OUTDATED_COUNT" >> $GITHUB_OUTPUT

          if [ $OUTDATED_COUNT -gt 0 ]; then
            echo "⚠️ Found $OUTDATED_COUNT outdated packages" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All packages up to date" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check critical library versions
        id: critical
        run: |
          echo "## Critical Library Versions" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          pip list | grep -E "anthropic|openai|fastapi|pydantic|pytest" >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          # Get versions
          ANTHROPIC_VERSION=$(pip show anthropic | grep Version | awk '{print $2}')
          OPENAI_VERSION=$(pip show openai | grep Version | awk '{print $2}')

          echo "anthropic_version=$ANTHROPIC_VERSION" >> $GITHUB_OUTPUT
          echo "openai_version=$OPENAI_VERSION" >> $GITHUB_OUTPUT

          # Check if critical libraries are too old (>6 months)
          CRITICAL_OUTDATED=false

          # Check anthropic (should be >= 0.65)
          if [[ $(echo "$ANTHROPIC_VERSION 0.65" | awk '{print ($1 < $2)}') -eq 1 ]]; then
            echo "❌ Anthropic version too old: $ANTHROPIC_VERSION (min: 0.65)" >> $GITHUB_STEP_SUMMARY
            CRITICAL_OUTDATED=true
          fi

          # Check openai (should be >= 1.0)
          if [[ $(echo "$OPENAI_VERSION 1.0" | awk '{print ($1 < $2)}') -eq 1 ]]; then
            echo "❌ OpenAI version too old: $OPENAI_VERSION (min: 1.0)" >> $GITHUB_STEP_SUMMARY
            CRITICAL_OUTDATED=true
          fi

          if [ "$CRITICAL_OUTDATED" = true ]; then
            echo "critical_outdated=true" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ Critical libraries are current" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create issue for critical outdated dependencies
        if: failure() && steps.critical.outputs.critical_outdated == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const anthropicVersion = '${{ steps.critical.outputs.anthropic_version }}';
            const openaiVersion = '${{ steps.critical.outputs.openai_version }}';

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Critical Dependencies Outdated - Security Risk',
              body: `## Critical Library Versions Are Too Old

              The weekly dependency health check detected critically outdated libraries:

              - **anthropic**: ${anthropicVersion} (minimum: 0.65.0)
              - **openai**: ${openaiVersion} (minimum: 1.0.0)

              ### Impact

              - API compatibility issues
              - Missing security fixes
              - Potential bugs from deprecated APIs
              - May break core functionality

              ### Action Required

              Update dependencies immediately:

              \`\`\`bash
              pip install --upgrade anthropic openai
              pip freeze > requirements.txt
              pytest tests/ -v  # Verify no breakage
              git add requirements.txt
              git commit -m "deps: Update critical LLM libraries"
              \`\`\`

              ### History

              This issue was found during automated dependency health check on ${new Date().toISOString().split('T')[0]}.

              See workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
              `,
              labels: ['dependencies', 'security', 'critical', 'automated']
            })

      - name: Warn about non-critical outdated dependencies
        if: steps.outdated.outputs.outdated_count > 5
        run: |
          echo "::warning::Found ${{ steps.outdated.outputs.outdated_count }} outdated packages. Consider updating dependencies."
          echo "Run 'pip list --outdated' locally to see details."

      - name: Upload outdated packages report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outdated-dependencies-report
          path: outdated.txt
