name: Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t piper-morgan -f ./services/orchestration/Dockerfile .

      - name: Verify Python version in container
        run: |
          echo "=== Container Python Version Verification ==="
          docker run --rm piper-morgan python --version
          docker run --rm piper-morgan python -c "import sys; print(f'✅ Container Python: {sys.version}')"
          docker run --rm piper-morgan python -c "
          import sys
          required = (3, 11)
          current = sys.version_info[:2]
          assert current >= required, f'Python {current} < {required}'
          print('✅ Container Python version consistency verified')
          "

      - name: Test container functionality
        run: |
          echo "=== Container Functionality Test ==="
          # Test that the container can import key modules
          docker run --rm piper-morgan python -c "
          import fastapi
          import sqlalchemy
          import pytest
          print('✅ Key dependencies import successfully')
          "

      - name: Docker summary
        run: |
          echo "## Docker Build Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Docker image built successfully" >> $GITHUB_STEP_SUMMARY
          echo "✅ Python 3.11 verified in container" >> $GITHUB_STEP_SUMMARY
          echo "✅ Container functionality tested" >> $GITHUB_STEP_SUMMARY
          echo "Environment: Ubuntu Latest" >> $GITHUB_STEP_SUMMARY
