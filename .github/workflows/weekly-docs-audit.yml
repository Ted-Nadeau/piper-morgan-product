name: Weekly Documentation Audit

on:
  schedule:
    # Runs every Monday at 9:00 AM Pacific (PDT: UTC-7, PST: UTC-8)
    # Using 4:00 PM UTC which is 9:00 AM PDT (summer) / 8:00 AM PST (winter)
    - cron: "0 16 * * 1"
  workflow_dispatch: # Allows manual trigger for testing

permissions:
  issues: write
  contents: read

jobs:
  create-audit-issue:
    runs-on: ubuntu-latest
    name: Create Weekly Documentation Audit Issue

    steps:
      - name: Check for existing audit issue
        id: check-existing
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const title = `FLY-AUDIT: Weekly Docs Audit - ${today}`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'documentation,maintenance'
            });

            const existingIssue = issues.data.find(issue =>
              issue.title.includes('Weekly Docs Audit') &&
              issue.title.includes(today)
            );

            if (existingIssue) {
              console.log(`Audit issue already exists: #${existingIssue.number}`);
              return existingIssue.number;
            }
            return null;

      - name: Create documentation audit issue
        if: steps.check-existing.outputs.result == 'null'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const dayOfWeek = new Date().toLocaleDateString('en-US', { weekday: 'long' });

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `FLY-AUDIT: Weekly Docs Audit - ${today}`,
              body: `## Weekly Documentation Audit Checklist

              **Generated**: ${dayOfWeek}, ${today}

              ### 🗺️ **IMPORTANT: File Location Reference**

              **Before reporting any file as "missing", consult [docs/NAVIGATION.md](../docs/NAVIGATION.md) for actual locations.**

              **Common File Locations** (not in project root):
              - **roadmap.md**: \`docs/internal/planning/roadmap/roadmap.md\`
              - **Pattern catalog**: \`docs/internal/architecture/current/patterns/README.md\`
              - **ADRs**: \`docs/internal/architecture/current/adrs/\`
              - **Session logs**: \`dev/2025/MM/DD/\` structure
              - **User config**: \`config/PIPER.md\` (generic), \`config/PIPER.user.md\` (user-specific)

              **Agent instructions**:
              1. Read docs/NAVIGATION.md FIRST before searching for files
              2. Use NAVIGATION.md as source of truth for directory structure
              3. Only report files as "missing" if not found at documented location
              4. Document actual location if found elsewhere

              ### 📚 Claude Project Knowledge Updates (PRIORITY)

              - [ ] List all docs modified this week: \`git log --since="1 week ago" --name-only --pretty=format: | grep "\\.md$" | sort -u\`
              - [ ] **ACTION FOR PM**: Update these files in Claude project knowledge:
                - [ ] architecture.md (if modified)
                - [ ] docs/internal/architecture/current/patterns/README.md (if modified)
                - [ ] docs/internal/development/methodology-core/ files (if modified)
                - [ ] docs/briefing/METHODOLOGY.md (if modified)
                - [ ] .cursor/rules/ files (if modified) - Note: NOT docs/cursorrules/
                - [ ] docs/internal/planning/roadmap/roadmap.md (if modified)
                - [ ] **BRIEFING-* files**: Update docs/briefing/ (auto-syncs to knowledge/ via symlinks)
              - [ ] **BRIEFING-CURRENT-STATE refresh** (PRIORITY): Verify \`knowledge/BRIEFING-CURRENT-STATE.md\` reflects:
                - Current sprint/epic position (Inchworm Position section)
                - Recent progress summary (week table with issues closed, tests added)
                - Updated metrics snapshot (pattern count, ADR count, test suite size)
                - Current open items and blockers
                - Last Updated timestamp matches audit date
                - **Note**: This file goes stale quickly during high-velocity sprints - refresh weekly minimum
                - [ ] [List other changed files here after running command]
              - [ ] Verify knowledge base matches current docs version
              - [ ] **Check for stale knowledge/ files**: No duplicates, only symlinks and unique files

              ### 🔍 Automated Audits (Claude Code /agent or manual verification)

              **Note**: Agent may choose manual verification instead of launching subagents. Both approaches are acceptable as long as evidence is provided.

              - [ ] Run: \`/agent Audit docs/ for stale content older than 30 days\`
              - [ ] Run: \`/agent Find duplicate files in docs/ and list consolidation opportunities\`
              - [ ] Run: \`/agent Check for broken links in docs/**/*.md\`
              - [ ] Run: \`/agent Verify cross-references between methodology files in docs/internal/development/methodology-core/\`
              - [ ] Run: \`/agent Check for missing cross-references between docs/NAVIGATION.md and docs/internal/development/methodology-core/INDEX.md\`
              - [ ] Run: \`/agent Verify briefing documents completeness in docs/briefing/\`
              - [ ] Run: \`/agent Check omnibus logs structure in docs/omnibus-logs/\`

              ### 🔧 Infrastructure & Pattern Verification

              - [ ] Check app.py line count: \`wc -l web/app.py\` (trigger refactor at 1000 lines, currently ~750)
              - [ ] Verify port 8001 documented everywhere: \`grep -r "8080" docs/ --include="*.md"\` (should be empty)
              - [ ] Check for mock fallbacks: \`grep -r "mock_\\|fallback" services/ --include="*.py"\`
              - [ ] Verify AsyncSessionFactory pattern: \`grep -r "DatabasePool" services/ --include="*.py"\` (should be empty)
              - [ ] Check cursor rules exist: \`ls -la .cursor/rules/\` (5 rule files expected)
              - [ ] Verify pattern count matches: \`ls -1 docs/internal/architecture/current/patterns/pattern-*.md | wc -l\` should match README
              - [ ] Verify ADR naming convention: \`ls docs/internal/architecture/current/adrs/adr-*.md\` (all lowercase)

              ### 📁 Session Log Management & Omnibus Synthesis

              - [ ] Check for completed session logs in \`dev/2025/MM/DD/\` structure
              - [ ] **Synthesis Identification** (evolving process - handle carefully):
                - [ ] Review recent session logs for synthesis candidates
                - [ ] Check if any sessions qualify for omnibus consolidation
                - [ ] Identify cross-session patterns worth preserving
                - [ ] Note: Synthesis practices still evolving - defer complex decisions to PM
              - [ ] Verify no stranded session logs outside \`dev/\` directory structure
              - [ ] Review \`docs/omnibus-logs/\` for completeness and organization

              ### 🎯 Sprint & Roadmap Alignment

              - [ ] **Verify roadmap.md location** (common error):
                - Location: \`docs/internal/planning/roadmap/roadmap.md\` (NOT project root)
                - Check last update: \`git log -1 --format="%ai" -- docs/internal/planning/roadmap/roadmap.md\`
                - If not found, consult docs/NAVIGATION.md before reporting as missing
              - [ ] Update roadmap.md with completed items from current sprint
              - [ ] **Note**: backlog.md deprecated (moved to trash) - GitHub is source of truth
              - [ ] **Note**: completed.md deprecated - GitHub is source of truth
              - [ ] Check for new issues needing taxonomy labels (TRACK-EPIC format)
              - [ ] Update sprint goals in config/PIPER.user.md if new sprint started
                - **Note**: \`config/PIPER.md\` = generic system config (always exists)
                - **Note**: \`config/PIPER.user.md\` = user-specific config (may not exist if using database config)
                - These are TWO DIFFERENT FILES with different purposes

              ### 📊 GitHub Issues Sync

              - [ ] Run: \`gh issue list --state all --json number,title,state,labels --limit 200 > docs/planning/pm-issues-status.json\`
              - [ ] Verify all open issues have TRACK-EPIC taxonomy
              - [ ] **Note**: backlog.md deprecated - use GitHub Projects for planning
              - [ ] Identify stale issues (no activity >30 days)
              - [ ] **Note**: CSV generation deprecated - GitHub is source of truth

              ### 📚 Pattern & Knowledge Capture

              - [ ] Update docs/internal/architecture/current/patterns/README.md with:
                - [ ] New patterns discovered this week (50 total patterns as of Jan 19, 2026)
                - [ ] Check \`docs/internal/architecture/current/patterns/README.md\` for current count
                - [ ] Verify README.md count matches actual pattern-*.md files in directory
                - [ ] Update README.md if new patterns (050+) not yet documented
                - [ ] Core Architecture Patterns (infrastructure/error handling)
                - [ ] Data & Query Patterns (sessions/queries)
                - [ ] AI & Intelligence Patterns (LLM/spatial/intent/multi-agent)
                - [ ] Integration & Platform Patterns (config/CLI/plugins)
                - [ ] Development & Process Patterns (methodology/workflow)
              - [ ] **Verify pattern count accuracy**:
                - Run: \`ls -1 docs/internal/architecture/current/patterns/pattern-*.md | wc -l\`
                - Compare actual file count to README.md documented count
                - Investigate discrepancy if counts don't match
                - Update README.md to document any undocumented patterns
                - Common cause: Recent pattern sweep work may add patterns without updating README
              - [ ] Review session logs for patterns to document
              - [ ] Check for methodology improvements to capture
              - [ ] **Review CITATIONS.md (docs/references/CITATIONS.md) for completeness**:
                - [ ] Verify all architectural patterns have proper attribution (DDD, MCP, spatial intelligence)
                - [ ] Verify all tooling decisions are attributed (Serena workflow, etc.)
                - [ ] Only credit unique additions as our own
                - [ ] Note any unclear attributions to ask PM
              - [ ] Verify template directories are current and organized:
                - [ ] \`docs/internal/development/tools/session-log-templates/\`
                - [ ] \`docs/internal/planning/current/templates/\`
                - [ ] \`docs/internal/development/methodology-core/\` (multi-agent templates)

              ### 🎯 Quality Checks

              - [ ] Verify methodology files are in \`docs/internal/development/methodology-core/\` (not scattered)
              - [ ] Ensure all ADRs are in \`docs/internal/architecture/current/adrs/\` with proper numbering
              - [ ] Check that no backup files (\`*.backup\`, \`*.old\`) are in active directories
              - [ ] Verify no test files in production directories
              - [ ] Check for TODO/FIXME comments: \`grep -r "TODO\\|FIXME" services/ web/ cli/\`
              - [ ] **Review root README.md (repository view)** - Agent should perform review:
                - [ ] Check for outdated "new" claims (>2 weeks old features should not say "NEW:")
                - [ ] Verify external links are current and working (especially pmorgan.tech)
                - [ ] Ensure code examples are still accurate
                - [ ] Check setup instructions match current process (PIPER.user.md vs database config)
                - [ ] Ensure content is brief and evergreen
                - [ ] Remove any accidental test content or markdown artifacts
                - [ ] **Create review document**: Save findings to \`dev/2025/MM/DD/root-readme-review.md\`
                - [ ] Note: This is separate from docs/README.md (pmorgan.tech homepage)

              ### 📈 Metrics Collection (Optional)

              - [ ] Document count: \`find docs/ -name "*.md" | wc -l\`
              - [ ] Archive size: \`du -sh docs/archive/\`
              - [ ] Active docs size: \`du -sh docs/ --exclude=archive\`
              - [ ] Code line count: \`find . -name "*.py" -type f -exec wc -l {} + | tail -1\`
              - [ ] Test coverage if available: \`pytest --cov\`

              ### 🔄 Workflow Improvement (Meta/Recursive)

              - [ ] Review this week's sweep for process improvements
              - [ ] Check if PM provided feedback on sweep workflow
              - [ ] Update \`.github/workflows/weekly-docs-audit.yml\` with improvements if needed
              - [ ] Document improvement ideas for next iteration
              - [ ] Note: OK if no updates needed this week

              ---

              **Assigned to**: @mediajunkie
              **Due**: End of day
              **Priority**: Focus on Knowledge Updates and Infrastructure Verification first

              ### Notes
              - Knowledge sync prevents Claude drift - do this FIRST
              - Infrastructure checks prevent assumption cascades
              - Create PM-* issues for any problems discovered
              - Update this checklist template if new patterns emerge

              ### 📖 Lessons Learned from Previous Audits

              **Nov 5, 2025 (#293) - Key Findings**:
              1. ✅ **Always check docs/NAVIGATION.md first** before reporting files missing
              2. ✅ **PIPER.md ≠ PIPER.user.md** - Two different files (generic vs user-specific)
              3. ✅ **Pattern count discrepancy** - New patterns from pattern sweep may not be in README yet
              4. ✅ **roadmap.md location** - Lives at \`docs/internal/planning/roadmap/roadmap.md\`, not root
              5. ✅ **Root README.md review** - Agent should perform review, create findings document

              **Agent Guidelines**:
              - Provide evidence for all claims (command outputs, file paths, line numbers)
              - Explain any items that couldn't be completed (don't just skip)
              - Create separate review documents for complex analyses
              - Update this "Lessons Learned" section if new patterns discovered

              ### ❓ FAQ (Accumulated from Agent Questions)

              **Q: Should I use subagents or manual verification?**
              A: Use your judgment for efficiency. Haiku subagents are token-efficient for straightforward tasks like finding duplicates or broken links. Manual is fine for quick checks.

              **Q: How much time should this take?**
              A: Thoroughness over speed. This is part of the Excellence Flywheel - take as long as needed for a proper audit. Can span multiple days if needed.

              **Q: What's the priority order?**
              A: 1) Claude Knowledge Updates (prevents drift), 2) Infrastructure checks (prevents assumption cascades), 3) Everything else

              **Q: What about files in dev/active/ vs dev/2025/MM/DD/?**
              A: dev/active/ is for current work-in-progress. Completed work should move to dated folders. Duplicates in dev/ are common and should be cleaned up.

              ### ✅ Closing This Issue

              **Use the \`close-issue-properly\` skill when closing this issue.**

              Before closing:
              1. Update checkboxes in this description (checked = done, unchecked = skipped/deferred)
              2. Add closing comment with evidence (findings doc path, issues created, metrics)
              3. Note any deferred items and why

              **Anti-pattern**: Adding a comment and closing without updating description checkboxes.

              ### References
              - [CLAUDE.md Project Instructions](../CLAUDE.md)
              - [Architecture Documentation](../docs/architecture/architecture.md)
              - [Pattern Catalog](../docs/internal/architecture/current/patterns/README.md)
              - [Session Archive Guidelines](../docs/session-logs/archive-guidelines.md)
              - [Navigation Hub](../docs/NAVIGATION.md) - **Check this FIRST for file locations**`,
              labels: ['documentation', 'maintenance', 'weekly-audit', 'fly-audit'],
              assignees: ['mediajunkie']
            });

            console.log(`Created documentation audit issue #${issue.data.number}`);
            return issue.data.number;

      - name: Post completion summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            console.log('✅ Weekly documentation audit workflow completed successfully');
            console.log('Check GitHub issues for the FLY-AUDIT Weekly Docs Audit checklist');
            console.log('PRIORITY: Update Claude project knowledge with any changed files');

  update-essential-briefings:
    runs-on: ubuntu-latest
    name: Update Essential Briefings
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Essential Briefings
        run: |
          # Extract current position from roadmap or current state
          if [ -f "docs/internal/planning/roadmap/roadmap.md" ]; then
            POSITION=$(grep -i "current position\|position:" docs/internal/planning/roadmap/roadmap.md | head -1 | cut -d: -f2 | xargs)
          elif [ -f "knowledge/BRIEFING-CURRENT-STATE.md" ]; then
            POSITION=$(grep -i "position:" knowledge/BRIEFING-CURRENT-STATE.md | head -1 | cut -d: -f2 | xargs)
          else
            POSITION="1.1.3.2"  # Default fallback
          fi

          echo "Updating essential briefings with position: $POSITION"

          # Update all essential briefings with current position
          for file in knowledge/BRIEFING-ESSENTIAL-*.md; do
            if [ -f "$file" ]; then
              # Update the position line in each briefing
              sed -i "s/Position\*\*: [0-9.]*/Position**: $POSITION/" "$file"
              echo "Updated $file with position $POSITION"
            fi
          done

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if [[ `git status --porcelain` ]]; then
            git add knowledge/BRIEFING-ESSENTIAL-*.md
            git commit -m "chore: Update essential briefings position

            🤖 Generated with [Claude Code](https://claude.ai/code)"
            git push
            echo "✅ Essential briefings updated and committed"
          else
            echo "ℹ️ No changes needed in essential briefings"
          fi
