name: Weekly Documentation Audit

on:
  schedule:
    # Runs every Monday at 9:00 AM Pacific (PDT: UTC-7, PST: UTC-8)
    # Using 4:00 PM UTC which is 9:00 AM PDT (summer) / 8:00 AM PST (winter)
    - cron: "0 16 * * 1"
  workflow_dispatch: # Allows manual trigger for testing

permissions:
  issues: write
  contents: read

jobs:
  create-audit-issue:
    runs-on: ubuntu-latest
    name: Create Weekly Documentation Audit Issue

    steps:
      - name: Check for existing audit issue
        id: check-existing
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const title = `FLY-AUDIT: Weekly Docs Audit - ${today}`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'documentation,maintenance'
            });

            const existingIssue = issues.data.find(issue =>
              issue.title.includes('Weekly Docs Audit') &&
              issue.title.includes(today)
            );

            if (existingIssue) {
              console.log(`Audit issue already exists: #${existingIssue.number}`);
              return existingIssue.number;
            }
            return null;

      - name: Create documentation audit issue
        if: steps.check-existing.outputs.result == 'null'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const dayOfWeek = new Date().toLocaleDateString('en-US', { weekday: 'long' });

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `FLY-AUDIT: Weekly Docs Audit - ${today}`,
              body: `## Weekly Documentation Audit Checklist

              **Generated**: ${dayOfWeek}, ${today}

              ### 📚 Claude Project Knowledge Updates (PRIORITY)

              - [ ] List all docs modified this week: \`git log --since="1 week ago" --name-only --pretty=format: | grep "\\.md$" | sort -u\`
              - [ ] **ACTION FOR PM**: Update these files in Claude project knowledge:
                - [ ] CLAUDE.md (if modified)
                - [ ] architecture.md (if modified)
                - [ ] pattern-catalog.md (if modified)
                - [ ] gameplan-template.md (if modified)
                - [ ] agent-prompt-template.md (if modified)
                - [ ] methodology files (if modified)
                - [ ] roadmap.md and backlog.md (if modified)
                - [ ] [List other changed files here after running command]
              - [ ] Verify knowledge base matches current docs version

              ### 🔍 Automated Audits (Claude Code /agent)

              - [ ] Run: \`/agent Audit docs/ for stale content older than 30 days\`
              - [ ] Run: \`/agent Find duplicate files in docs/ and list consolidation opportunities\`
              - [ ] Run: \`/agent Check for broken links in docs/**/*.md\`
              - [ ] Run: \`/agent Verify cross-references between methodology files\`

              ### 🔧 Infrastructure & Pattern Verification

              - [ ] Check app.py line count: \`wc -l web/app.py\` (trigger refactor at 1000 lines, currently ~750)
              - [ ] Verify port 8001 documented everywhere: \`grep -r "8080" docs/ --include="*.md"\` (should be empty)
              - [ ] Check for mock fallbacks: \`grep -r "mock_\\|fallback" services/ --include="*.py"\`
              - [ ] Verify AsyncSessionFactory pattern: \`grep -r "DatabasePool" services/ --include="*.py"\` (should be empty)

              ### 📁 Session Log Management

              - [ ] Archive session logs older than 30 days to \`docs/archive/session-logs/\`
              - [ ] Verify session log archive structure by month
              - [ ] Update session log INDEX.md with new entries
              - [ ] Check for stranded session logs outside main directory

              ### 🎯 Sprint & Roadmap Alignment

              - [ ] Update roadmap.md with completed items from current sprint
              - [ ] Move completed sprint items to completed.md
              - [ ] Verify backlog.md priorities match current sprint goals
              - [ ] Check for new issues needing taxonomy labels (TRACK-EPIC format)
              - [ ] Update sprint goals in PIPER.user.md if new sprint started

              ### 📊 GitHub Issues Sync

              - [ ] Run: \`gh issue list --state all --json number,title,state,labels --limit 200 > docs/planning/pm-issues-status.json\`
              - [ ] Verify all open issues have TRACK-EPIC taxonomy
              - [ ] Check for issues missing from backlog.md
              - [ ] Identify stale issues (no activity >30 days)
              - [ ] Update CSV if still in use: \`docs/planning/pmissuesstatus.csv\`

              ### 📚 Pattern & Knowledge Capture

              - [ ] Update pattern-catalog.md with:
                - [ ] New patterns discovered this week
                - [ ] Infrastructure verification patterns
                - [ ] Multi-agent coordination patterns
                - [ ] Error handling patterns (no mock fallbacks!)
              - [ ] Review session logs for patterns to document
              - [ ] Check for methodology improvements to capture

              ### 🎯 Quality Checks

              - [ ] Verify methodology files are in \`docs/methodology/\` (not scattered)
              - [ ] Ensure all ADRs are in \`docs/architecture/adr/\` with proper numbering
              - [ ] Check that no backup files (\`*.backup\`, \`*.old\`) are in active directories
              - [ ] Verify no test files in production directories
              - [ ] Check for TODO/FIXME comments: \`grep -r "TODO\\|FIXME" services/ web/ cli/\`

              ### 📈 Metrics Collection (Optional)

              - [ ] Document count: \`find docs/ -name "*.md" | wc -l\`
              - [ ] Archive size: \`du -sh docs/archive/\`
              - [ ] Active docs size: \`du -sh docs/ --exclude=archive\`
              - [ ] Code line count: \`find . -name "*.py" -type f -exec wc -l {} + | tail -1\`
              - [ ] Test coverage if available: \`pytest --cov\`

              ---

              **Assigned to**: @mediajunkie
              **Due**: End of day
              **Priority**: Focus on Knowledge Updates and Infrastructure Verification first

              ### Notes
              - Knowledge sync prevents Claude drift - do this FIRST
              - Infrastructure checks prevent assumption cascades
              - Create PM-* issues for any problems discovered
              - Update this checklist template if new patterns emerge

              ### References
              - [CLAUDE.md Project Instructions](../CLAUDE.md)
              - [Architecture Documentation](../docs/architecture/architecture.md)
              - [Pattern Catalog](../docs/methodology/pattern-catalog.md)
              - [Session Archive Guidelines](../docs/session-logs/archive-guidelines.md)`,
              labels: ['documentation', 'maintenance', 'weekly-audit', 'fly-audit'],
              assignees: ['mediajunkie']
            });

            console.log(`Created documentation audit issue #${issue.data.number}`);
            return issue.data.number;

      - name: Post completion summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            console.log('✅ Weekly documentation audit workflow completed successfully');
            console.log('Check GitHub issues for the FLY-AUDIT Weekly Docs Audit checklist');
            console.log('PRIORITY: Update Claude project knowledge with any changed files');
