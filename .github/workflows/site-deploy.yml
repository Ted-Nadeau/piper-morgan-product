name: Deploy Website + Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'site/package-lock.json'

      - name: Install dependencies
        working-directory: ./site
        run: npm ci

      - name: Build Next.js site
        working-directory: ./site
        run: npm run build

      - name: Combine website and docs
        run: |
          # Create deployment directory
          mkdir -p deploy

          # Copy website files to root
          cp -r site/out/* deploy/

          # Copy docs to /docs subdirectory
          mkdir -p deploy/docs
          cp -rL docs/* deploy/docs/

          # Create index redirect for docs (optional)
          echo '<meta http-equiv="refresh" content="0; url=/docs/">' > deploy/docs.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
