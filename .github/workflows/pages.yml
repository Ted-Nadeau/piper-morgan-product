name: Deploy Markdown Docs to GitHub Pages (DISABLED - Replaced by site-deploy.yml)

# Disabled to avoid conflicts with the main website deployment
# The website deployment now handles both site and docs
on:
  workflow_dispatch: # Manual trigger only

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Copy docs to a public directory for deployment
      - name: Copy docs to public
        run: |
          mkdir public
          cp -rL docs/* public/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
