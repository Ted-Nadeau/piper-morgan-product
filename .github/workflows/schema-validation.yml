name: PM-056 Schema Validation

on:
  push:
    branches: [main, develop]
    paths:
      - "services/domain/models.py"
      - "services/database/models.py"
      - "scripts/schema_validator.py"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/domain/models.py"
      - "services/database/models.py"
      - "scripts/schema_validator.py"
  workflow_dispatch: # Allow manual triggering

jobs:
  schema-validation:
    name: Domain/Database Schema Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Schema Validator
        id: schema-validator
        run: |
          PYTHONPATH=. python scripts/schema_validator.py
        continue-on-error: true

      - name: Check Schema Validation Results
        if: steps.schema-validator.outcome == 'failure'
        run: |
          echo "❌ Schema validation failed!"
          echo "Domain and database models have mismatches."
          echo "Please review the validation output above."
          echo ""
          echo "Common issues:"
          echo "- Missing fields in database models"
          echo "- Type mismatches between domain and database"
          echo "- Missing conversion methods (to_domain/from_domain)"
          echo "- Enum value mismatches"
          exit 1

      - name: Schema Validation Passed
        if: steps.schema-validator.outcome == 'success'
        run: |
          echo "✅ Schema validation passed!"
          echo "Domain and database models are in sync."

  # Additional validation for known issues
  known-issues-check:
    name: Known Schema Issues Check
    runs-on: ubuntu-latest
    needs: schema-validation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check for object_id vs object_position issue
        run: |
          echo "🔍 Checking for known spatial positioning issues..."
          if grep -r "object_id" services/domain/models.py && ! grep -r "object_position" services/domain/models.py; then
            echo "❌ Found object_id usage without object_position - this was a known issue!"
            echo "Domain models should use object_position for spatial positioning."
            exit 1
          fi
          echo "✅ No object_id/object_position mismatches found"

      - name: Check for missing conversion methods
        run: |
          echo "🔍 Checking for missing to_domain/from_domain methods..."
          python scripts/check_conversion_methods.py
          echo "✅ All database models have proper conversion methods"
