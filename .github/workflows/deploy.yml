name: Deploy Piper Morgan Website to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './piper-morgan-website/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ./piper-morgan-website

      - name: Build Next.js site
        run: npm run build
        working-directory: ./piper-morgan-website

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./piper-morgan-website/out
          publish_branch: gh-pages
