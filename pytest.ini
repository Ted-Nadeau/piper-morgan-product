[pytest]
pythonpath = .
markers =
    smoke: Critical path tests that should run in <5 seconds total
    unit: Unit tests that should run in <30 seconds total
    integration: Integration tests that may take up to 2 minutes
    performance: Performance tests
    benchmark: Benchmark tests
    regression: Performance regression tests to detect degradation
    contract: Contract tests verifying plugin interface compliance
    llm: Tests that require LLM API calls (skipped in CI without keys)
    transition: State transition tests (fresh install, setup flows) - Issue #485

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Performance optimizations for smoke tests
addopts =
    --ignore=tests/archive
    --ignore=*/archive/*
    --tb=short
    -x
    --maxfail=1
    --import-mode=importlib

# Async test configuration
asyncio_mode = auto
# Note: asyncio_default_fixture_loop_scope and asyncio_default_test_loop_scope are deprecated
# in pytest-asyncio 0.21.x - use asyncio_mode = auto (set above) instead.
# See Issue #290 for session-scoped event loop context.
