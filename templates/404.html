<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found</title>
  <link rel="stylesheet" href="/static/css/tokens.css" />
  <link rel="stylesheet" href="/static/css/error-page.css" />
</head>
<body>
  <main class="error-container">
    <div class="error-content">
      <div class="error-icon">🔍</div>

      <h1 class="error-title">Hmm, I can't find that page</h1>

      <p class="error-message">
        The page you're looking for doesn't seem to exist. It may have been moved or removed.
      </p>

      <p class="error-code">Error 404</p>

      <div class="error-actions">
        <a href="/" class="btn btn-primary">
          Go to Home
        </a>
        <button class="btn btn-secondary" onclick="window.history.back()">
          Go Back
        </button>
      </div>

      <div class="error-help">
        <h2>Here's what might help:</h2>
        <ul>
          <li>Double-check the URL for typos</li>
          <li>Head back home and navigate from there</li>
          <li>Let me know if you think this is a mistake</li>
        </ul>
      </div>
    </div>
  </main>

  <script>
    // Announce error to screen readers
    if (typeof Toast !== 'undefined' && Toast.error) {
      Toast.error('Page Not Found', 'The page you requested could not be found. Error 404.');
    }
  </script>
</body>
</html>
