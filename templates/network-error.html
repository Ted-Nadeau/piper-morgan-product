<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network Error - Connection Failed</title>
  <link rel="stylesheet" href="/static/css/tokens.css" />
  <link rel="stylesheet" href="/static/css/error-page.css" />
</head>
<body>
  <main class="error-container">
    <div class="error-content">
      <div class="error-icon">📡</div>

      <h1 class="error-title">I can't reach the server</h1>

      <p class="error-message">
        Looks like we lost connection. Can you check your internet and try again?
      </p>

      <p class="error-code">Network Error</p>

      <div class="error-actions">
        <a href="/" class="btn btn-primary">
          Go to Home
        </a>
        <button class="btn btn-secondary" onclick="location.reload()">
          Retry Connection
        </button>
      </div>

      <div class="error-help">
        <h2>A few things to try:</h2>
        <ul>
          <li>Check your Wi-Fi or mobile data</li>
          <li>Make sure you're not in airplane mode</li>
          <li>Try refreshing once you're back online</li>
        </ul>
      </div>
    </div>
  </main>

  <script>
    // Announce error to screen readers
    if (typeof Toast !== 'undefined' && Toast.error) {
      Toast.error('Connection Failed', 'Unable to reach the server. Please check your internet connection.');
    }

    // Auto-retry when connection is restored
    window.addEventListener('online', () => {
      if (typeof Toast !== 'undefined' && Toast.success) {
        Toast.success('Connection Restored', 'Your connection has been restored. Reloading page...');
        setTimeout(() => location.reload(), 1500);
      } else {
        setTimeout(() => location.reload(), 1500);
      }
    });
  </script>
</body>
</html>
