<!DOCTYPE html>
<html>
<head>
    <title>Login - Piper Morgan</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="/static/css/auth.css" />
    <style>
        /* Inline critical CSS for faster load */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <img src="/assets/pm-logo.png" alt="Piper Morgan" class="auth-logo">
            <h1>Welcome Back</h1>
            <p>Log in to continue to Piper Morgan</p>
        </div>

        <form id="login-form" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    required
                    autocomplete="username"
                    autofocus
                    placeholder="Enter your username"
                />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    autocomplete="current-password"
                    placeholder="Enter your password"
                />
            </div>

            <div id="error-message" class="error-message" style="display: none;"></div>

            <button type="submit" class="auth-button" id="login-button">
                Log In
            </button>
        </form>

        <div class="auth-footer">
            <p>
                Don't have an account?
                <a href="#" onclick="alert('Registration coming soon!'); return false;">Sign up</a>
            </p>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
</body>
</html>
