<!--
  Place Window Component (#684 MUX-NAV-PLACES)

  Displays a Place as a "window" into an external source.
  Supports confidence-based display modes:
  - HIGH: Show summary inline
  - MEDIUM: Offer to expand
  - LOW: Suggest visiting source

  Data attributes:
  - data-place-id: Unique identifier
  - data-place-type: ISSUE_TRACKING, TEMPORAL, etc.
  - data-confidence: HIGH, MEDIUM, LOW
  - data-hardness: For trust-gated visibility
  - data-source-url: Link to external source
-->

<style>
  /* Place Window Base Styles */
  .place-window {
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
    transition: box-shadow 0.2s ease;
  }

  .place-window:hover {
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
  }

  /* Type-specific atmospheres */
  .place-window[data-place-type="issue_tracking"] {
    background: linear-gradient(135deg, #f5f7fa 0%, #e8eef5 100%);
    border-left: 3px solid #5a6c7d;
  }

  .place-window[data-place-type="temporal"] {
    background: linear-gradient(135deg, #faf5f0 0%, #f5ebe0 100%);
    border-left: 3px solid #a67c52;
  }

  .place-window[data-place-type="communication"] {
    background: linear-gradient(135deg, #f5faf5 0%, #e8f5e8 100%);
    border-left: 3px solid #5a7d5c;
  }

  .place-window[data-place-type="documentation"] {
    background: linear-gradient(135deg, #faf5fa 0%, #f0e8f5 100%);
    border-left: 3px solid #7d5a7d;
  }

  /* Place Header */
  .place-window-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .place-window-icon {
    width: 20px;
    height: 20px;
    opacity: 0.7;
  }

  .place-window-name {
    font-weight: 500;
    color: #333;
    font-size: 14px;
  }

  .place-window-staleness {
    margin-left: auto;
    font-size: 11px;
    color: #888;
  }

  /* Place Summary (Piper's perspective) */
  .place-window-summary {
    font-size: 14px;
    color: #444;
    line-height: 1.5;
  }

  /* Confidence indicators */
  .place-window[data-confidence="low"] .place-window-summary {
    opacity: 0.7;
    font-style: italic;
  }

  /* Expand/Visit actions */
  .place-window-actions {
    display: flex;
    gap: 12px;
    margin-top: 12px;
  }

  .place-window-action {
    font-size: 12px;
    color: #666;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .place-window-action:hover {
    color: #333;
    text-decoration: underline;
  }

  /* Expanded details */
  .place-window-details {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(0, 0, 0, 0.1);
    font-size: 13px;
  }

  .place-window-details[hidden] {
    display: none;
  }

  /* Trust-gated visibility */
  .place-window.place-trust-hidden {
    display: none;
  }

  .place-window.place-trust-visible {
    display: block;
  }
</style>

<template id="place-window-template">
  <div class="place-window"
       data-place-id=""
       data-place-type=""
       data-confidence=""
       data-hardness=""
       data-source-url=""
       role="region"
       aria-label="">

    <div class="place-window-header">
      <span class="place-window-icon" aria-hidden="true"></span>
      <span class="place-window-name"></span>
      <span class="place-window-staleness"></span>
    </div>

    <div class="place-window-summary"></div>

    <div class="place-window-actions">
      <a href="#" class="place-window-action place-window-expand" hidden>
        <span>Show details</span>
      </a>
      <a href="" class="place-window-action place-window-visit" target="_blank" rel="noopener">
        <span>Visit source</span>
        <span aria-hidden="true">↗</span>
      </a>
    </div>

    <div class="place-window-details" hidden></div>
  </div>
</template>

<script>
  /**
   * Place Window Manager (#684 MUX-NAV-PLACES)
   *
   * Creates and manages Place windows with:
   * - Type-specific styling (atmosphere)
   * - Confidence-based display modes
   * - Trust-gated visibility
   * - Staleness indicators
   */
  (function() {
    'use strict';

    // Icon SVG paths for each Place type
    const PLACE_ICONS = {
      issue_tracking: '<svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 4v4M8 10v1"/></svg>',
      temporal: '<svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 4v4l3 2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>',
      communication: '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 3h12v8H4l-2 2V3z" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>',
      documentation: '<svg viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="2" width="10" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="5" y1="5" x2="11" y2="5" stroke="currentColor"/><line x1="5" y1="8" x2="11" y2="8" stroke="currentColor"/></svg>',
    };

    /**
     * Create a Place window element from data
     * @param {Object} place - Place data object
     * @returns {HTMLElement} - Place window element
     */
    function createPlaceWindow(place) {
      const template = document.getElementById('place-window-template');
      const clone = template.content.cloneNode(true);
      const window = clone.querySelector('.place-window');

      // Set data attributes
      window.dataset.placeId = place.id;
      window.dataset.placeType = place.place_type;
      window.dataset.confidence = place.confidence;
      window.dataset.hardness = place.hardness;
      window.dataset.sourceUrl = place.source_url;
      window.setAttribute('aria-label', `${place.name} window`);

      // Set content
      window.querySelector('.place-window-name').textContent = place.name;
      window.querySelector('.place-window-summary').textContent = place.summary;
      window.querySelector('.place-window-staleness').textContent = place.staleness || '';
      window.querySelector('.place-window-visit').href = place.source_url;

      // Set icon
      const iconContainer = window.querySelector('.place-window-icon');
      iconContainer.innerHTML = PLACE_ICONS[place.place_type] || PLACE_ICONS.documentation;

      // Confidence-based display
      if (place.confidence === 'high' && place.details) {
        const expandBtn = window.querySelector('.place-window-expand');
        expandBtn.hidden = false;
        expandBtn.addEventListener('click', function(e) {
          e.preventDefault();
          const details = window.querySelector('.place-window-details');
          details.hidden = !details.hidden;
          this.textContent = details.hidden ? 'Show details' : 'Hide details';
        });
      }

      if (place.confidence === 'low') {
        // Low confidence: emphasize visiting source
        const visitLink = window.querySelector('.place-window-visit');
        visitLink.style.fontWeight = '500';
      }

      return window;
    }

    /**
     * Apply trust-gated visibility to Place windows
     * @param {number} trustStage - Current user's trust stage (1-4)
     */
    function applyTrustVisibility(trustStage) {
      const windows = document.querySelectorAll('.place-window');
      windows.forEach(function(window) {
        const hardness = parseInt(window.dataset.hardness, 10);
        const minStage = getMinTrustStage(hardness);

        if (trustStage >= minStage) {
          window.classList.remove('place-trust-hidden');
          window.classList.add('place-trust-visible');
        } else {
          window.classList.remove('place-trust-visible');
          window.classList.add('place-trust-hidden');
        }
      });
    }

    /**
     * Convert hardness to minimum trust stage
     * Matches #419, #420, #421 logic
     */
    function getMinTrustStage(hardness) {
      if (hardness >= 5) return 1;  // HARDEST - always visible
      if (hardness >= 4) return 3;  // HARD - Stage 3+
      if (hardness >= 3) return 3;  // MEDIUM - Stage 3+
      return 4;                      // SOFT/SOFTEST - Stage 4+
    }

    /**
     * Render Places into a container
     * @param {HTMLElement} container - DOM element to render into
     * @param {Array} places - Array of Place data objects
     */
    function renderPlaces(container, places) {
      // Clear existing
      container.innerHTML = '';

      // Create windows
      places.forEach(function(place) {
        const window = createPlaceWindow(place);
        container.appendChild(window);
      });

      // Apply trust visibility
      const trustStage = window.trustStage || 1;
      applyTrustVisibility(trustStage);
    }

    // Expose functions globally
    window.PlaceWindow = {
      create: createPlaceWindow,
      render: renderPlaces,
      applyTrustVisibility: applyTrustVisibility,
      ICONS: PLACE_ICONS,
    };

    // Mark as loaded
    window.placeWindowLoaded = true;
  })();
</script>
