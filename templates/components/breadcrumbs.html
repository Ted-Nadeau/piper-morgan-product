<!-- Breadcrumb Navigation Component -->
<!-- Usage:
  {% set breadcrumbs = [
    {"label": "Settings", "url": "/settings"},
    {"label": "Personality", "url": None}
  ] %}
  {% include 'components/breadcrumbs.html' %}
-->

<style>
.breadcrumbs {
  background: #f8f9fa;
  border-bottom: 1px solid #ecf0f1;
  padding: 12px 0;
}

.breadcrumb-list {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  list-style: none;
}

.breadcrumb-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.breadcrumb-link {
  color: #7f8c8d;
  text-decoration: none;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: color 0.2s;
}

.breadcrumb-link:hover {
  color: #3498db;
}

.breadcrumb-link:focus {
  outline: 2px solid #3498db;
  outline-offset: 2px;
}

.breadcrumb-link svg {
  width: 16px;
  height: 16px;
}

.breadcrumb-separator {
  color: #bdc3c7;
  font-size: 14px;
  user-select: none;
}

.breadcrumb-current {
  color: #2c3e50;
  font-size: 14px;
  font-weight: 500;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

@media (max-width: 768px) {
  .breadcrumb-list {
    padding: 0 16px;
  }

  .breadcrumb-link,
  .breadcrumb-current {
    font-size: 13px;
  }
}
</style>

{% if breadcrumbs %}
<nav class="breadcrumbs" role="navigation" aria-label="Breadcrumb">
  <ol class="breadcrumb-list">
    <!-- Home Link -->
    <li class="breadcrumb-item">
      <a href="/" class="breadcrumb-link">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8.707 1.5a1 1 0 00-1.414 0L.646 8.146a.5.5 0 00.708.708L2 8.207V13.5A1.5 1.5 0 003.5 15h9a1.5 1.5 0 001.5-1.5V8.207l.646.647a.5.5 0 00.708-.708L13 5.793V2.5a.5.5 0 00-.5-.5h-1a.5.5 0 00-.5.5v1.293L8.707 1.5z"/>
        </svg>
        <span class="sr-only">Home</span>
      </a>
    </li>

    <!-- Breadcrumb Items -->
    {% for crumb in breadcrumbs %}
    <li class="breadcrumb-item">
      <span class="breadcrumb-separator" aria-hidden="true">/</span>
      {% if crumb.url %}
        <a href="{{ crumb.url }}" class="breadcrumb-link">
          {{ crumb.label }}
        </a>
      {% else %}
        <span class="breadcrumb-current" aria-current="page">
          {{ crumb.label }}
        </span>
      {% endif %}
    </li>
    {% endfor %}
  </ol>
</nav>
{% endif %}
