<!-- Chat Widget Component - Floating Version
     Extracted from home.html for reusability
     Phase 2: Floating widget with toggle functionality
     Dependencies: chat.css, timestamp-utils.js, chat.js, marked.js, permissions.js
     Issue #564: Added timestamp-utils.js for date/session dividers and hover timestamps
-->

<div class="chat-widget-container" id="chat-widget-container">
  <!-- Chat Window (hidden when collapsed) -->
  <div class="chat-container" id="chat-container">
    <div class="chat-header">
      <span>Chat with Piper</span>
      <button type="button" class="chat-close" onclick="window.toggleChatWidget()" aria-label="Close chat">×</button>
    </div>

    <div id="chat-window" class="chat-window">
      <div class="message-container">
        <div class="message bot-message">
          What can I help you with today?
        </div>
      </div>
    </div>

    <form class="chat-form" id="chatForm">
      <input
        type="text"
        name="message"
        class="chat-input"
        placeholder="e.g., Users are complaining about the login page being slow..."
        autocomplete="off"
        required
      />
      <button type="submit" class="submit-btn">Send</button>
    </form>
  </div>

  <!-- Toggle Button (always visible) -->
  <button type="button" class="chat-widget-toggle" onclick="window.toggleChatWidget()" aria-label="Toggle chat widget">
    💬
  </button>
</div>
