<!--
  Greeting Context Component (#425 MUX-IMPLEMENT-MEMORY-SYNC)

  Displays context-aware greetings based on user's session history.
  Uses GreetingContextService conditions from ADR-054.

  Conditions:
  - SAME_DAY_RECENT: Quick return, work reference
  - NEXT_DAY_ACTIVE: Yesterday reference, offer choice
  - WEEK_GAP: Light reference, offer fresh start
  - MONTH_GAP: Welcome back, prominent fresh start
  - PREVIOUS_TRIVIAL: Clean start, no reference
  - PREVIOUS_NEGATIVE: Clean slate, no prior context
  - FIRST_SESSION: Welcome message (FTUX)

  Design reference: PDR-002 (Conversational Glue)
  "Never trap users" - always offer pivot to fresh context
-->

<style>
  .greeting-context {
    background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 24px;
    border: 1px solid #e2e8f0;
  }

  .greeting-context.trust-hidden {
    display: none;
  }

  .greeting-message {
    font-size: 20px;
    font-weight: 500;
    color: #1e293b;
    margin: 0 0 8px 0;
    line-height: 1.4;
  }

  .greeting-subtext {
    font-size: 14px;
    color: #64748b;
    margin: 0 0 20px 0;
  }

  .greeting-topic {
    font-weight: 500;
    color: #3b82f6;
  }

  .greeting-entities {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }

  .greeting-entity {
    background: #e0f2fe;
    color: #0369a1;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 500;
  }

  .greeting-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .greeting-btn {
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    border: none;
  }

  .greeting-btn.primary {
    background: #3b82f6;
    color: white;
  }

  .greeting-btn.primary:hover {
    background: #2563eb;
  }

  .greeting-btn.secondary {
    background: white;
    color: #475569;
    border: 1px solid #cbd5e1;
  }

  .greeting-btn.secondary:hover {
    background: #f8fafc;
    border-color: #94a3b8;
  }

  /* Condition-specific styling */
  .greeting-context[data-condition="first_session"] {
    background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
    border-color: #bfdbfe;
  }

  .greeting-context[data-condition="previous_negative"] {
    /* Clean, neutral - no special styling */
  }

  .greeting-context[data-condition="month_gap"] .greeting-message {
    /* Slightly warmer for returning users */
  }

  /* Time indicator */
  .greeting-time-indicator {
    font-size: 12px;
    color: #94a3b8;
    margin-top: 12px;
  }
</style>

<!-- Greeting Context Template -->
<template id="greeting-context-template">
  <div class="greeting-context" data-condition="" data-trust-min-stage="2">
    <p class="greeting-message"></p>
    <p class="greeting-subtext"></p>
    <div class="greeting-entities"></div>
    <div class="greeting-actions">
      <button class="greeting-btn primary continue-btn">Continue</button>
      <button class="greeting-btn secondary fresh-btn">Start fresh</button>
    </div>
    <p class="greeting-time-indicator"></p>
  </div>
</template>

<script>
  /**
   * Greeting Context Manager (#425 MUX-IMPLEMENT-MEMORY-SYNC)
   *
   * Implements PDR-002 greeting patterns:
   * - Context-aware greetings based on session history
   * - "Never trap users" - always offer choice
   * - Clean slate for negative sentiment
   */
  (function() {
    'use strict';

    // Greeting messages per condition (from ADR-054/PDR-002)
    const GREETING_MESSAGES = {
      same_day_recent: {
        message: "Back already!",
        subtext: "We were working on {topic}—want to continue?",
        showTopic: true,
        showEntities: true,
        showContinue: true,
        showFresh: true,
        continueLabel: "Continue",
        freshLabel: "Different focus",
      },
      next_day_active: {
        message: "Welcome back!",
        subtext: "Yesterday we discussed {topic}.",
        showTopic: true,
        showEntities: true,
        showContinue: true,
        showFresh: true,
        continueLabel: "Continue",
        freshLabel: "Different focus",
      },
      week_gap: {
        message: "It's been a bit!",
        subtext: "Want to pick up where we left off?",
        showTopic: false,
        showEntities: false,
        showContinue: true,
        showFresh: true,
        continueLabel: "Pick up",
        freshLabel: "Start fresh",
      },
      month_gap: {
        message: "Welcome back!",
        subtext: "Want me to catch you up, or start fresh?",
        showTopic: false,
        showEntities: false,
        showContinue: true,
        showFresh: true,
        continueLabel: "Catch me up",
        freshLabel: "Start fresh",
      },
      previous_trivial: {
        message: "Hey!",
        subtext: "What would you like to work on?",
        showTopic: false,
        showEntities: false,
        showContinue: false,
        showFresh: false,
      },
      previous_negative: {
        message: "What would you like to work on?",
        subtext: "",
        showTopic: false,
        showEntities: false,
        showContinue: false,
        showFresh: false,
      },
      first_session: {
        message: "Welcome!",
        subtext: "I'm Piper, here to help you stay on top of your work.",
        showTopic: false,
        showEntities: false,
        showContinue: false,
        showFresh: false,
      },
    };

    // Format time since last session
    function formatTimeSince(minutes) {
      if (!minutes || minutes < 1) return null;

      if (minutes < 60) {
        return `${Math.round(minutes)} minutes ago`;
      } else if (minutes < 1440) {
        const hours = Math.round(minutes / 60);
        return `${hours} hour${hours !== 1 ? 's' : ''} ago`;
      } else {
        const days = Math.round(minutes / 1440);
        return `${days} day${days !== 1 ? 's' : ''} ago`;
      }
    }

    /**
     * Render greeting context
     * @param {Object} context - Greeting context from API
     * @param {string} context.condition - One of GreetingCondition values
     * @param {string} context.topic_reference - Topic from last session
     * @param {Array} context.entity_references - Entities mentioned
     * @param {number} context.minutes_since_last - Minutes since last session
     * @param {boolean} context.can_reference_work - Whether to show work reference
     * @param {number} trustStage - Current user trust stage
     */
    function render(context, trustStage) {
      const template = document.getElementById('greeting-context-template');
      if (!template) {
        console.error('Greeting context template not found');
        return null;
      }

      const config = GREETING_MESSAGES[context.condition] || GREETING_MESSAGES.previous_trivial;
      const clone = template.content.cloneNode(true);
      const container = clone.querySelector('.greeting-context');

      // Set condition attribute
      container.setAttribute('data-condition', context.condition);

      // Trust gating: hide work references for Stage 1
      if (trustStage < 2 && config.showTopic) {
        // Downgrade to simpler greeting
        container.querySelector('.greeting-message').textContent = "Welcome back!";
        container.querySelector('.greeting-subtext').textContent = "What would you like to work on?";
        container.querySelector('.greeting-entities').style.display = 'none';
        container.querySelector('.greeting-actions').style.display = 'none';
        container.querySelector('.greeting-time-indicator').style.display = 'none';
        return container;
      }

      // Set message
      container.querySelector('.greeting-message').textContent = config.message;

      // Set subtext with topic substitution
      let subtext = config.subtext;
      if (config.showTopic && context.topic_reference) {
        subtext = subtext.replace('{topic}', `<span class="greeting-topic">${escapeHtml(context.topic_reference)}</span>`);
      } else {
        subtext = subtext.replace('{topic}', 'your work');
      }
      container.querySelector('.greeting-subtext').innerHTML = subtext;

      // Show/hide subtext
      if (!subtext) {
        container.querySelector('.greeting-subtext').style.display = 'none';
      }

      // Entity references
      const entitiesContainer = container.querySelector('.greeting-entities');
      if (config.showEntities && context.entity_references && context.entity_references.length > 0) {
        context.entity_references.slice(0, 5).forEach(entity => {
          const tag = document.createElement('span');
          tag.className = 'greeting-entity';
          tag.textContent = entity;
          entitiesContainer.appendChild(tag);
        });
      } else {
        entitiesContainer.style.display = 'none';
      }

      // Action buttons
      const actionsContainer = container.querySelector('.greeting-actions');
      const continueBtn = container.querySelector('.continue-btn');
      const freshBtn = container.querySelector('.fresh-btn');

      if (!config.showContinue && !config.showFresh) {
        actionsContainer.style.display = 'none';
      } else {
        if (config.showContinue) {
          continueBtn.textContent = config.continueLabel;
        } else {
          continueBtn.style.display = 'none';
        }

        if (config.showFresh) {
          freshBtn.textContent = config.freshLabel;
        } else {
          freshBtn.style.display = 'none';
        }
      }

      // Time indicator
      const timeIndicator = container.querySelector('.greeting-time-indicator');
      const timeSince = formatTimeSince(context.minutes_since_last);
      if (timeSince && config.showTopic) {
        timeIndicator.textContent = `Last session: ${timeSince}`;
      } else {
        timeIndicator.style.display = 'none';
      }

      return container;
    }

    /**
     * Mount greeting context into container
     * @param {HTMLElement} targetElement - Container to mount into
     * @param {Object} context - Greeting context
     * @param {number} trustStage - User trust stage
     * @param {Function} onContinue - Callback when Continue clicked
     * @param {Function} onFresh - Callback when Start Fresh clicked
     */
    function mount(targetElement, context, trustStage, onContinue, onFresh) {
      const element = render(context, trustStage);
      if (!element) return;

      // Wire up callbacks
      const continueBtn = element.querySelector('.continue-btn');
      const freshBtn = element.querySelector('.fresh-btn');

      if (continueBtn && onContinue) {
        continueBtn.addEventListener('click', () => {
          onContinue(context);
          // Remove greeting after action
          targetElement.innerHTML = '';
        });
      }

      if (freshBtn && onFresh) {
        freshBtn.addEventListener('click', () => {
          onFresh(context);
          // Remove greeting after action
          targetElement.innerHTML = '';
        });
      }

      targetElement.innerHTML = '';
      targetElement.appendChild(element);
    }

    // Escape HTML for XSS prevention
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Expose globally
    window.GreetingContext = {
      render: render,
      mount: mount,
      MESSAGES: GREETING_MESSAGES,
      formatTimeSince: formatTimeSince,
    };

    // Mark as loaded
    window.greetingContextLoaded = true;
  })();
</script>
