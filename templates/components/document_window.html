<!--
  Document Window Component (#422 MUX-IMPLEMENT-DOCS-ACCESS)

  Displays documents as Place windows with Piper's perspective.
  Follows the Place window pattern from #684 with Documentation atmosphere.

  Data attributes:
  - data-document-id: Unique identifier (file_id)
  - data-confidence: HIGH, MEDIUM, LOW (based on summary availability)
  - data-hardness: 2 (SOFT - Stage 4+ visibility)
  - data-source-url: Original file or external link

  Trust-gating: Stage 4+ (SOFT hardness)
-->

<style>
  /* Document Window Base Styles */
  /* Extends place-window pattern with documentation-specific styling */

  .document-window {
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
    transition: box-shadow 0.2s ease;
    cursor: pointer;
    /* Documentation atmosphere - purple/reference gradient */
    background: linear-gradient(135deg, #faf5fa 0%, #f0e8f5 100%);
    border-left: 3px solid #7d5a7d;
  }

  .document-window:hover {
    box-shadow: 0 2px 8px rgba(125, 90, 125, 0.15);
  }

  .document-window:focus {
    outline: 2px solid #7d5a7d;
    outline-offset: 2px;
  }

  /* Document Header */
  .document-window-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .document-window-icon {
    width: 20px;
    height: 20px;
    opacity: 0.7;
    color: #7d5a7d;
  }

  .document-window-name {
    font-weight: 500;
    color: #333;
    font-size: 14px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .document-window-type {
    font-size: 11px;
    color: #7d5a7d;
    background: rgba(125, 90, 125, 0.1);
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  /* Document Summary (Piper's perspective) */
  .document-window-summary {
    font-size: 14px;
    color: #444;
    line-height: 1.5;
    margin-bottom: 8px;
  }

  /* Piper's voice styling */
  .document-window-summary::before {
    content: none; /* Don't add prefix via CSS - do it in JS for natural variation */
  }

  /* Confidence indicators */
  .document-window[data-confidence="low"] .document-window-summary {
    opacity: 0.7;
    font-style: italic;
  }

  .document-window[data-confidence="low"] .document-window-summary::after {
    content: " (I haven't looked closely at this one yet)";
    font-size: 12px;
    color: #888;
  }

  /* Document metadata */
  .document-window-meta {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: #888;
  }

  .document-window-meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Actions */
  .document-window-actions {
    display: flex;
    gap: 12px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(125, 90, 125, 0.1);
  }

  .document-window-action {
    font-size: 12px;
    color: #7d5a7d;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: background 0.2s;
  }

  .document-window-action:hover {
    background: rgba(125, 90, 125, 0.1);
    text-decoration: none;
  }

  /* Trust-gated visibility */
  .document-window.trust-hidden {
    display: none;
  }

  .document-window.trust-visible {
    display: block;
  }

  /* Loading state */
  .document-window.loading .document-window-summary {
    color: #888;
  }

  .document-window.loading .document-window-summary::before {
    content: "Looking at this... ";
  }
</style>

<template id="document-window-template">
  <div class="document-window"
       data-document-id=""
       data-confidence="medium"
       data-hardness="2"
       data-source-url=""
       data-min-stage="4"
       role="article"
       tabindex="0"
       aria-label="">

    <div class="document-window-header">
      <svg class="document-window-icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <rect x="3" y="2" width="10" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <line x1="5" y1="5" x2="11" y2="5" stroke="currentColor"/>
        <line x1="5" y1="8" x2="11" y2="8" stroke="currentColor"/>
        <line x1="5" y1="11" x2="9" y2="11" stroke="currentColor"/>
      </svg>
      <span class="document-window-name"></span>
      <span class="document-window-type"></span>
    </div>

    <div class="document-window-summary"></div>

    <div class="document-window-meta">
      <span class="document-window-meta-item document-window-size">
        <span aria-hidden="true">📦</span>
        <span class="document-window-size-value"></span>
      </span>
      <span class="document-window-meta-item document-window-date">
        <span aria-hidden="true">📅</span>
        <span class="document-window-date-value"></span>
      </span>
    </div>

    <div class="document-window-actions">
      <button class="document-window-action document-window-expand" type="button">
        <span>Ask about this</span>
      </button>
      <a href="" class="document-window-action document-window-download" download>
        <span>Download</span>
        <span aria-hidden="true">↓</span>
      </a>
    </div>
  </div>
</template>

<script>
  /**
   * Document Window Manager (#422 MUX-IMPLEMENT-DOCS-ACCESS)
   *
   * Creates and manages Document windows with:
   * - Documentation atmosphere styling (purple gradient)
   * - Piper's perspective summaries
   * - Trust-gated visibility (Stage 4+)
   * - Confidence-based display
   */
  (function() {
    'use strict';

    // Piper's voice prefixes for document summaries (rotate)
    const SUMMARY_PREFIXES = [
      "I see this document is about",
      "This contains information on",
      "Looking at this, it covers",
      "This document discusses",
    ];

    // Default summary when not yet analyzed
    const DEFAULT_SUMMARIES = [
      "I haven't had a chance to look through this one yet.",
      "I'll take a closer look at this when you ask me about it.",
      "This document is in your collection - ask me anything about it.",
    ];

    let prefixIndex = 0;

    /**
     * Get a rotating Piper voice prefix
     */
    function getPrefix() {
      const prefix = SUMMARY_PREFIXES[prefixIndex];
      prefixIndex = (prefixIndex + 1) % SUMMARY_PREFIXES.length;
      return prefix;
    }

    /**
     * Get a default summary
     */
    function getDefaultSummary() {
      return DEFAULT_SUMMARIES[Math.floor(Math.random() * DEFAULT_SUMMARIES.length)];
    }

    /**
     * Format file size in human-readable format
     */
    function formatSize(bytes) {
      if (!bytes) return 'Unknown size';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    /**
     * Format date in friendly format
     */
    function formatDate(dateString) {
      if (!dateString) return 'Unknown date';
      const date = new Date(dateString);
      const now = new Date();
      const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));

      if (diffDays === 0) return 'Today';
      if (diffDays === 1) return 'Yesterday';
      if (diffDays < 7) return diffDays + ' days ago';
      return date.toLocaleDateString();
    }

    /**
     * Get file type label from content type
     */
    function getTypeLabel(contentType) {
      if (!contentType) return 'Doc';
      if (contentType.includes('pdf')) return 'PDF';
      if (contentType.includes('word') || contentType.includes('docx')) return 'Word';
      if (contentType.includes('text') || contentType.includes('plain')) return 'Text';
      if (contentType.includes('markdown') || contentType.includes('md')) return 'MD';
      if (contentType.includes('json')) return 'JSON';
      return 'Doc';
    }

    /**
     * Create a Document window element from file data
     * @param {Object} doc - Document data object (from files API)
     * @returns {HTMLElement} - Document window element
     */
    function createDocumentWindow(doc) {
      const template = document.getElementById('document-window-template');
      if (!template) {
        console.error('Document window template not found');
        return null;
      }

      const clone = template.content.cloneNode(true);
      const window = clone.querySelector('.document-window');

      // Set data attributes
      window.dataset.documentId = doc.file_id || doc.id;
      window.dataset.confidence = doc.summary ? 'high' : 'low';
      window.dataset.hardness = '2'; // SOFT hardness
      window.dataset.sourceUrl = `/api/v1/files/${doc.file_id || doc.id}/download`;

      // Set ARIA label
      const filename = doc.filename || doc.name || 'Document';
      window.setAttribute('aria-label', `Document: ${filename}`);

      // Set content
      window.querySelector('.document-window-name').textContent = filename;
      window.querySelector('.document-window-type').textContent = getTypeLabel(doc.content_type);

      // Set summary with Piper's voice
      const summaryEl = window.querySelector('.document-window-summary');
      if (doc.summary) {
        summaryEl.textContent = getPrefix() + ' ' + doc.summary.toLowerCase();
      } else {
        summaryEl.textContent = getDefaultSummary();
      }

      // Set metadata
      window.querySelector('.document-window-size-value').textContent = formatSize(doc.size);
      window.querySelector('.document-window-date-value').textContent = formatDate(doc.uploaded_at || doc.created_at);

      // Set download link
      const downloadLink = window.querySelector('.document-window-download');
      downloadLink.href = `/api/v1/files/${doc.file_id || doc.id}/download`;

      // Set up expand/ask action
      const expandBtn = window.querySelector('.document-window-expand');
      expandBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        // Dispatch custom event for modal handling
        const event = new CustomEvent('documentExpand', {
          detail: { documentId: doc.file_id || doc.id, filename: filename },
          bubbles: true
        });
        window.dispatchEvent(event);
      });

      // Click on window also expands
      window.addEventListener('click', function() {
        const event = new CustomEvent('documentExpand', {
          detail: { documentId: doc.file_id || doc.id, filename: filename },
          bubbles: true
        });
        window.dispatchEvent(event);
      });

      // Keyboard support
      window.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          const event = new CustomEvent('documentExpand', {
            detail: { documentId: doc.file_id || doc.id, filename: filename },
            bubbles: true
          });
          window.dispatchEvent(event);
        }
      });

      return window;
    }

    /**
     * Apply trust-gated visibility to Document windows
     * @param {number} trustStage - Current user's trust stage (1-4)
     */
    function applyTrustVisibility(trustStage) {
      const windows = document.querySelectorAll('.document-window');
      windows.forEach(function(window) {
        const minStage = parseInt(window.dataset.minStage || '4', 10);

        if (trustStage >= minStage) {
          window.classList.remove('trust-hidden');
          window.classList.add('trust-visible');
        } else {
          window.classList.remove('trust-visible');
          window.classList.add('trust-hidden');
        }
      });
    }

    /**
     * Render Documents into a container
     * @param {HTMLElement} container - DOM element to render into
     * @param {Array} documents - Array of document data objects
     */
    function renderDocuments(container, documents) {
      // Clear existing
      container.innerHTML = '';

      if (!documents || documents.length === 0) {
        container.innerHTML = `
          <div class="empty-state" role="status" aria-label="No documents">
            <div class="empty-state-icon" aria-hidden="true">📄</div>
            <h3 class="empty-state-title">No documents yet</h3>
            <p class="empty-state-message">Upload files or connect Notion, and I'll help you find what you need.</p>
          </div>
        `;
        return;
      }

      // Create windows
      documents.forEach(function(doc) {
        const window = createDocumentWindow(doc);
        if (window) {
          container.appendChild(window);
        }
      });

      // Apply trust visibility
      const trustStage = window.trustStage || 4;
      applyTrustVisibility(trustStage);
    }

    /**
     * Fetch document summary and update window
     * @param {string} documentId - Document ID to fetch summary for
     */
    async function fetchAndUpdateSummary(documentId) {
      const window = document.querySelector(`[data-document-id="${documentId}"]`);
      if (!window) return;

      window.classList.add('loading');

      try {
        const response = await fetch(`/api/v1/documents/${documentId}/analyze`, {
          method: 'POST',
          credentials: 'include'
        });

        if (response.ok) {
          const data = await response.json();
          const summaryEl = window.querySelector('.document-window-summary');
          if (data.summary) {
            summaryEl.textContent = getPrefix() + ' ' + data.summary.toLowerCase();
            window.dataset.confidence = 'high';
          }
        }
      } catch (error) {
        console.error('Error fetching summary:', error);
      } finally {
        window.classList.remove('loading');
      }
    }

    // Expose functions globally
    window.DocumentWindow = {
      create: createDocumentWindow,
      render: renderDocuments,
      applyTrustVisibility: applyTrustVisibility,
      fetchSummary: fetchAndUpdateSummary,
      getPrefix: getPrefix,
      formatSize: formatSize,
      formatDate: formatDate,
    };

    // Mark as loaded
    window.documentWindowLoaded = true;
  })();
</script>
