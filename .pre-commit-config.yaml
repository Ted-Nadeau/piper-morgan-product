repos:
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]
        exclude: ^venv/
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        exclude: ^venv/
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        exclude: ^venv/
  - repo: local
    hooks:
      - id: check-windows-filenames
        name: Check for Windows-incompatible filenames
        entry: python3 scripts/check-windows-filenames.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        description: |
          Prevents Windows-illegal characters in filenames (: < > " | ? *).
          Windows cannot process files with these characters; this blocks commits
          that would make the repository un-cloneable on Windows.
          Allows easy cross-platform development without breaking Windows users.
      - id: check-hallucinated-urls
        name: Check for Hallucinated GitHub URLs
        entry: .pre-commit-hooks/check-hallucinated-urls.py
        language: python
        pass_filenames: false
        always_run: true
      - id: smoke-tests
        name: Smoke Tests
        entry: ./scripts/run_tests.sh smoke
        language: system
        pass_filenames: false
        stages: [pre-commit]
        description: |
          Run smoke tests (<1s) to verify basic functionality before commit.
          Catches import errors and critical failures immediately.
      - id: documentation-check
        name: Documentation Check
        entry: .git/hooks/pre-commit.legacy
        language: script
        always_run: true
        pass_filenames: false
      - id: backlog-roadmap-sync
        name: Remind to sync GitHub when planning docs change
        entry: scripts/check-backlog-sync.sh
        language: script
        files: (backlog|roadmap)\.md$
        pass_filenames: false
      - id: github-architecture-enforcement
        name: GitHub Architecture Enforcement
        entry: bash -c 'PYTHONPATH=. python3 -m pytest tests/test_architecture_enforcement.py -xvs'
        language: system
        pass_filenames: false
        stages: [pre-commit]
        types: [python]
        files: '^(services/.*\.py|tests/test_architecture_enforcement\.py)$'
        description: |
          Prevents direct GitHubAgent imports and ensures router architecture compliance.
          This hook fails if any service bypasses the GitHubIntegrationRouter pattern.
      - id: direct-github-agent-check
        name: Direct GitHubAgent Import Check
        entry: bash
        args: ['-c', 'if grep -r "from.*github_agent import GitHubAgent" services/ --include="*.py" --exclude="services/integrations/github/*"; then echo "ERROR: Direct GitHubAgent imports found!"; exit 1; fi']
        language: system
        pass_filenames: false
        stages: [pre-commit]
        types: [python]
        files: '^services/.*\.py$'
        description: |
          Fast grep-based check for direct GitHubAgent imports.
          Prevents bypassing the router architecture.
      - id: prevent-direct-adapter-imports
        name: Prevent Direct Adapter Imports (Calendar, Notion, Slack)
        entry: python3 scripts/check_direct_imports.py
        language: system
        pass_filenames: true
        types: [python]
        files: '^services/.*\.py$'
        description: |
          Enforces router pattern for Calendar, Notion, and Slack integrations.
          Prevents direct imports of GoogleCalendarMCPAdapter, NotionMCPAdapter,
          SlackSpatialAdapter, and SlackClient in favor of integration routers.
          Established in CORE-QUERY-1 Phase 4-6.
      - id: validate-numbering
        name: Validate Pattern and ADR Numbering
        entry: scripts/validate-numbering.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]
        files: '^docs/internal/architecture/current/(patterns/pattern-|adrs/adr-).*\.md$'
        description: |
          Validates that new patterns and ADRs have consecutive numbering.
          Prevents duplicate or skipped numbers in pattern/ADR sequences.
          Use ./scripts/new-pattern.sh or ./scripts/new-adr.sh for auto-numbering.
      - id: check-tmp-work-files
        name: Check for Work Files in /tmp
        entry: scripts/check-tmp-work-files.sh
        language: script
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
        description: |
          Detects work files (reports, analysis, verification docs) in /tmp.
          These are ephemeral and will be lost. Must save to dev/active/ first.
          Prevents accidental loss of work products during development.
      - id: check-init-py
        name: Check __init__.py exists in services/
        entry: .pre-commit-hooks/check-init-py.sh
        language: script
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
        description: |
          Ensures all services/ subdirectories with .py files have __init__.py.
          Prevents Python 3.3+ namespace package issues that cause inconsistent
          import behavior between development and strict validation contexts.
      - id: check-manual-tests
        name: Check for misnamed manual tests
        entry: .pre-commit-hooks/check-manual-tests.sh
        language: script
        pass_filenames: false
        files: '^tests/.*test.*\.py$'
        stages: [pre-commit]
        description: |
          Detects manual test scripts incorrectly named with test_ prefix.
          Manual tests (with load_dotenv, hardcoded IDs) should be named
          manual_*.py or script_*.py to exclude from pytest collection.
      - id: release-notes-check
        name: Release Notes Enforcement (Production)
        entry: scripts/check-release-notes.sh
        language: script
        pass_filenames: false
        always_run: true
        stages: [pre-push]
        description: |
          Enforces release notes for production deployments.
          When pushing to production with a version change in pyproject.toml,
          requires docs/releases/RELEASE-NOTES-vX.Y.Z.md to exist.
          See docs/internal/operations/release-runbook.md for details.
      - id: api-versioning-check
        name: API Versioning Convention
        entry: python3 scripts/check-api-versioning.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
        files: '^(web/|templates/|services/).*\.(py|html|js)$'
        description: |
          Enforces /api/v1/ prefix on all API endpoints.
          Prevents silent 404s from inconsistent paths and API version drift.
          See CLAUDE.md 'API Conventions' section for details.
